<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChArUco Calibrator</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- Status strip -->
    <header id="top-bar">
      <div id="stat-frames" class="stat-item">
        <span class="stat-label">FRM</span>
        <span class="stat-value">0</span>
      </div>
      <div id="stat-auto" class="stat-item">
        <span class="led"></span>
        <span class="stat-label">AUTO</span>
        <span class="stat-value">OFF</span>
      </div>
      <div id="stat-rms" class="stat-item">
        <span class="led"></span>
        <span class="stat-label">RMS</span>
        <span class="stat-value">--</span>
      </div>
      <div id="stat-fps" class="stat-item">
        <span class="stat-label">FPS</span>
        <span class="stat-value">0.0</span>
      </div>
      <div id="stat-dict" class="stat-item">
        <span class="stat-label">DICT</span>
        <span class="stat-value">--</span>
      </div>
      <div id="stat-progress" class="stat-item hidden">
        <span class="stat-label">SRC</span>
        <span class="stat-value">--</span>
      </div>
      <span id="stat-calibrating" class="hidden">
        <span class="spinner"></span>
        CALIBRATING
      </span>
    </header>

    <!-- Main content -->
    <main id="content">
      <section id="video-panel">
        <img id="video-stream" alt="Camera feed">
        <div id="viewfinder-bl"></div>
        <div id="viewfinder-br"></div>
        <div id="flash-overlay" class="hidden"></div>
        <div id="start-overlay">
          <button id="start-btn">Start</button>
        </div>
      </section>

      <aside id="side-panel">
        <div class="panel-section">
          <h3>Coverage <span id="coverage-pct">0%</span></h3>
          <canvas id="coverage-grid" width="200" height="200"></canvas>
        </div>

        <div class="panel-section">
          <h3>Quality <span id="quality-pct">0%</span></h3>
          <div id="quality-bar"><div id="quality-fill"></div></div>
        </div>

        <div class="panel-section">
          <h3>Frame Score</h3>
          <table id="score-table">
            <tr><td>Corners</td><td id="score-corners">--</td></tr>
            <tr><td>Hull spread</td><td id="score-hull">--</td></tr>
            <tr><td>New coverage</td><td id="score-newcov">--</td></tr>
            <tr><td>Blur</td><td id="score-blur">--</td></tr>
            <tr class="total-row"><td>Total</td><td id="score-total">--</td></tr>
          </table>
          <div id="score-rejected" class="hidden"></div>
        </div>

        <div class="panel-section">
          <h3>Per-View Errors</h3>
          <canvas id="error-bars" width="240" height="40"></canvas>
        </div>
      </aside>
    </main>

    <!-- Toolbar -->
    <footer id="controls">
      <div id="button-row">
        <button data-action="capture">Capture</button>
        <button data-action="toggle_auto" id="btn-auto">Auto</button>
        <button data-action="calibrate">Calibrate</button>
        <button data-action="reset">Reset</button>
        <button data-action="save">Save</button>
        <button data-action="toggle_heatmap" id="btn-heatmap">Heatmap</button>
        <button data-action="undistort" id="btn-undistort">Undistort</button>
        <button data-action="undo">Undo</button>
      </div>
      <div id="shortcut-hint">
        SPC:capture  A:auto  C:calibrate  R:reset  S:save  H:heatmap  U:undistort  Z:undo
      </div>
    </footer>

    <!-- Prompt -->
    <div id="prompt-overlay" class="hidden">
      <div id="prompt-box">
        <p id="prompt-text"></p>
        <div id="prompt-buttons">
          <button data-action="confirm">Yes (Y)</button>
          <button data-action="deny">No (N)</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
