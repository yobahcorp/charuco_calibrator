# ChArUco Calibrator — Default Configuration
# Override via CLI flags or by copying this file and passing --config <path>

board:
  squares_x: 9          # Number of chessboard squares in X
  squares_y: 7          # Number of chessboard squares in Y
  square_length: 0.10   # Square side length in metres
  marker_length: 0.08   # ArUco marker side length in metres
  aruco_dict: DICT_7X7_50  # ArUco dictionary name

thresholds:
  min_corners: 6        # Minimum ChArUco corners to accept a frame
  min_blur_var: 50.0    # Minimum Laplacian variance (blur rejection)
  min_score: 0.3        # Minimum overall frame score to accept
  capture_cooldown_ms: 1500  # Minimum ms between auto-captures

coverage:
  grid_cols: 4          # Coverage grid columns
  grid_rows: 4          # Coverage grid rows
  scale_bins: 5         # Number of scale (board-size) bins

source:
  camera_id: 0          # OpenCV camera device ID
  # video_path: null    # Path to video file (overrides camera_id)
  # image_folder: null  # Path to folder of images (overrides camera_id)
  # ros_topic: null     # ROS 2 image topic (overrides camera_id)
  width: 0              # Requested capture width (0 = default)
  height: 0             # Requested capture height (0 = default)

output:
  output_dir: calibration_output   # Directory for YAML + NPZ output
  camera_name: camera              # Camera name in calibration YAML
  save_observations: true          # Also save observations.npz

auto_capture: false      # Start with auto-capture enabled
show_heatmap: true      # Start with heatmap overlay enabled
recalibrate_every: 5    # Re-run calibration every N accepted frames
auto_prune: true        # Auto-remove outlier frames after calibration
prune_threshold: 2.0    # Prune frames with error > N * mean RMS
gpu: false              # Enable OpenCL/CUDA GPU acceleration

ar:
  enabled: false          # Enable AR object overlay
  ar_object: solid    # Object type: axes, wireframe, solid, obj
  # obj_path: null        # Path to .obj file (only for ar_object: obj)
  scale: 1.0              # Object scale relative to board square length
  smooth_alpha: 0.6       # EMA smoothing factor for pose (0=max smooth, 1=no smooth)

bokeh:
  enabled: false          # Enable synthetic bokeh / depth-of-field effect
  strength: 25            # Max blur kernel size in pixels (must be odd)
  feather: 31             # Mask feathering kernel size in pixels (must be odd)
  blur_mode: gaussian     # Blur type: gaussian or lens (disk kernel)
  focus_mode: board_focus # Focus mode: board_focus or tilt_shift

